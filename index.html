<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L-infection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #020802;
      --green-dim:  #0d2e0d;
      --green-mid:  #1e6e1e;
      --green:      #32b432;
      --green-lo:   #4a7a4a;
      --red:        #e0162f;
      --red-glow:   rgba(224,22,47,.7);
      --green-glow: rgba(50,180,50,.75);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { height:100%; }

    body {
      background: var(--bg);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* grid */
    body::before {
      content:''; position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(20,60,20,.13) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20,60,20,.13) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events:none; z-index:0;
    }
    /* vignette */
    body::after {
      content:''; position:fixed; inset:0;
      background: radial-gradient(ellipse at 50% 48%, transparent 36%, #000 100%);
      pointer-events:none; z-index:0;
    }

    /* scanlines */
    .scanlines {
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        to bottom, transparent, transparent 3px,
        rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px
      );
      pointer-events:none; z-index:10;
    }

    /* ── LOADER ── */
    .loader {
      position:fixed; inset:0; background:#000;
      z-index:200; display:flex; align-items:center; justify-content:center;
      transition: opacity .7s ease;
    }
    .loader.hide { opacity:0; pointer-events:none; }
    .dots { display:flex; gap:10px; justify-content:center; margin-bottom:14px; }
    .dots span {
      width:8px; height:8px; border-radius:50%;
      background: var(--green-dim);
      animation: dp 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2){ animation-delay:.2s; }
    .dots span:nth-child(3){ animation-delay:.4s; }
    @keyframes dp {
      0%,80%,100%{ transform:scale(.5); opacity:.25; }
      40%        { transform:scale(1.3); opacity:1; }
    }
    .loader-lbl { font-size:.72rem; letter-spacing:.3em; color:var(--green-lo); text-transform:uppercase; text-align:center; }

    /* ── OFFLINE ── */
    .offline {
      display:none; position:fixed; inset:0; z-index:150;
      flex-direction:column; align-items:center; justify-content:center;
      gap:18px; background:var(--bg);
    }
    .offline.show { display:flex; }
    .offline-icon { opacity:.9; }
    .wifi-arc { fill:none; stroke:#2a0a0e; stroke-linecap:round; }
    .wifi-dot  { fill:#2a0a0e; }
    .wifi-cross line { stroke:#8c1a26; stroke-width:5; stroke-linecap:round; }
    .offline-title {
      font-family:'Cinzel',serif;
      font-size:clamp(.95rem,4vw,1.2rem); letter-spacing:.15em;
      color:#8c2020; text-align:center;
    }
    .offline-sub {
      font-size:clamp(.58rem,2.3vw,.66rem); letter-spacing:.13em;
      color:#4a1a1a; text-align:center; max-width:250px; line-height:1.75;
    }
    .offline-note {
      margin-top:4px;
      font-size:clamp(.52rem,2vw,.6rem); letter-spacing:.1em;
      color:#2e1010; text-align:center; max-width:230px; line-height:1.6;
      border-top:1px solid #2a0a0e; padding-top:10px;
    }

    /* ── SITE TITLE ── */
    .site-title {
      position:fixed; top:clamp(16px,4vw,30px); left:50%; transform:translateX(-50%);
      font-family:'Cinzel',serif;
      font-size:clamp(.9rem,3.5vw,1.6rem);
      font-weight:900; letter-spacing:.38em;
      color:var(--green-lo); text-transform:uppercase;
      white-space:nowrap; z-index:5;
      opacity:0; animation: fadeUp .9s ease .2s forwards;
    }

    /* ── CONTENT ── */
    .content {
      position:relative; z-index:5;
      display:flex; flex-direction:column; align-items:center;
      width:100%; max-width:420px;
      padding: clamp(80px,16vw,110px) 24px clamp(16px,5vw,24px);
    }

    /* ── HEART ── */
    .heart-wrap {
      position:relative;
      width: clamp(120px,38vw,172px);
      height:clamp(120px,38vw,172px);
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
    }
    .heart-svg {
      width:78%; height:78%;
      filter: drop-shadow(0 0 20px var(--red-glow));
      animation: beat .88s ease-in-out infinite, hColorAnim 3.5s ease 1.2s forwards;
    }
    @keyframes beat {
      0%,100%{ transform:scale(1); }
      15%    { transform:scale(1.1); }
      30%    { transform:scale(1); }
      46%    { transform:scale(1.055); }
    }
    @keyframes hColorAnim {
      0%  { filter:drop-shadow(0 0 20px var(--red-glow)); }
      55% { filter:drop-shadow(0 0 26px rgba(140,60,20,.55)); }
      100%{ filter:drop-shadow(0 0 22px var(--green-glow)); }
    }
    #hp { fill:#e0162f; animation: fillM 3.5s ease 1.2s forwards; }
    @keyframes fillM {
      0%  { fill:#e0162f; }
      55% { fill:#7a2a10; }
      100%{ fill:#28a028; }
    }
    #hg { fill:url(#hgl); }

    .ring,.ring2 {
      position:absolute; border-radius:50%;
      animation: rPulse 1.75s ease-out infinite, rColor 3.5s ease 1.2s forwards;
    }
    .ring  { width:84%; height:84%; border:1.5px solid rgba(224,22,47,.32); }
    .ring2 { width:96%; height:96%; border:1px solid rgba(224,22,47,.16); animation-delay:.65s,.65s; }
    @keyframes rPulse { 0%{transform:scale(1);opacity:.8;} 100%{transform:scale(1.75);opacity:0;} }
    @keyframes rColor {
      0%  { border-color:rgba(224,22,47,.32); }
      100%{ border-color:rgba(50,180,50,.3); }
    }

    /* ── INFECTED TEXT ── */
    .infected-text {
      font-family:'Cinzel',serif;
      font-size:clamp(.8rem,3.8vw,1.3rem);
      font-weight:700; letter-spacing:.1em;
      color:var(--green); text-align:center;
      margin-top:clamp(16px,4vw,26px);
      text-shadow:0 0 14px rgba(50,180,50,.4);
      opacity:0; animation: fadeUp .9s ease 4.9s forwards;
    }

    /* ── COUNTER ── */
    .counter-block {
      margin-top:clamp(12px,3vw,20px);
      text-align:center;
      opacity:0; animation: fadeUp .9s ease 5.1s forwards;
    }
    .counter-label {
      font-size:clamp(.58rem,2vw,.7rem);
      color:var(--green-lo); letter-spacing:.22em;
      text-transform:uppercase; margin-bottom:5px;
    }
    .counter-num {
      font-size:clamp(1.9rem,9vw,3.2rem);
      color:var(--green); letter-spacing:.05em;
      text-shadow:0 0 18px rgba(50,180,50,.5);
      display:inline-block; min-width:60px;
    }
    .counter-line {
      height:1px; width:100%;
      background:linear-gradient(90deg,transparent,var(--green-mid),transparent);
      margin-top:5px;
    }

    /* ── DISCLAIMER ── */
    .disclaimer {
      margin-top: clamp(16px,5vw,28px);
      padding: 10px 18px;
      border: 1px solid rgba(40,80,40,.22);
      border-radius: 4px;
      background: rgba(10,30,10,.4);
      font-size: clamp(.55rem,2vw,.63rem);
      color: rgba(60,95,60,.7);
      letter-spacing: .07em;
      text-align: center;
      line-height: 1.6;
      opacity:0; animation: fadeUp .9s ease 5.5s forwards;
      width:100%;
    }

    /* ── PARTICLES ── */
    .particles { position:fixed; inset:0; pointer-events:none; z-index:3; }
    .particle  { position:absolute; border-radius:50%; opacity:0; animation:fUp linear infinite; }
    @keyframes fUp {
      0%  { transform:translateY(0) scale(1); opacity:0; }
      8%  { opacity:.5; }
      88% { opacity:.12; }
      100%{ transform:translateY(-105vh) scale(.2); opacity:0; }
    }

    @keyframes fadeUp {
      from{ opacity:0; transform:translateY(10px); }
      to  { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div>
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="loader-lbl">Инициализация...</div>
    </div>
  </div>

  <!-- Offline -->
  <div class="offline" id="offline">
    <svg width="110" height="88" viewBox="0 0 110 88">
      <!-- перечёркнутые дуги вай-фай — тёмно-серые -->
      <path d="M7 44 Q55 4 103 44"  fill="none" stroke="#2a1a1a" stroke-width="6.5" stroke-linecap="round"/>
      <path d="M20 57 Q55 25 90 57"  fill="none" stroke="#2a1a1a" stroke-width="6.5" stroke-linecap="round"/>
      <path d="M35 70 Q55 52 75 70"  fill="none" stroke="#2a1a1a" stroke-width="6.5" stroke-linecap="round"/>
      <circle cx="55" cy="80" r="5.5" fill="#2a1a1a"/>
      <!-- красный крест -->
      <line x1="68" y1="2"  x2="96" y2="30" stroke="#9b1a26" stroke-width="5.5" stroke-linecap="round"/>
      <line x1="96" y1="2"  x2="68" y2="30" stroke="#9b1a26" stroke-width="5.5" stroke-linecap="round"/>
    </svg>
    <div class="offline-title">Нет соединения с интернетом</div>
    <div class="offline-sub">
      Подключитесь к сети —<br>и L&#8209;infection вас найдёт
    </div>
    <div class="offline-note">
      ⚠ Заражение без сети не засчитывается
    </div>
  </div>

  <div class="scanlines"></div>
  <div class="particles" id="particles"></div>
  <div class="site-title">L &mdash; infection</div>

  <div class="content">
    <div class="heart-wrap">
      <div class="ring"></div>
      <div class="ring2"></div>
      <svg class="heart-svg" viewBox="0 0 100 92" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="hgl" cx="38%" cy="28%" r="58%">
            <stop offset="0%"   stop-color="rgba(255,255,255,.2)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
        </defs>
        <path id="hp" d="M50 87 C46 83,6 60,6 33 C6 16,19 5,32 5 C39 5,45 9,50 17 C55 9,61 5,68 5 C81 5,94 16,94 33 C94 60,54 83,50 87 Z"/>
        <path id="hg" d="M50 87 C46 83,6 60,6 33 C6 16,19 5,32 5 C39 5,45 9,50 17 C55 9,61 5,68 5 C81 5,94 16,94 33 C94 60,54 83,50 87 Z"/>
      </svg>
    </div>

    <div class="infected-text">Вы были заражены L&#8209;infection</div>

    <div class="counter-block">
      <div class="counter-label">Уже заражено</div>
      <div class="counter-num" id="counter">—</div>
      <div class="counter-line"></div>
    </div>

    <div class="disclaimer">
      Этот вирус — выдумка.<br>
      Никаких опасных программ и ссылок не распространяется.
    </div>
  </div>

  <script>
    // ── OFFLINE ──
    function checkOnline() {
      if (!navigator.onLine) {
        document.getElementById('loader').classList.add('hide');
        document.getElementById('offline').classList.add('show');
        return false;
      }
      return true;
    }
    window.addEventListener('offline', () => document.getElementById('offline').classList.add('show'));
    window.addEventListener('online',  () => document.getElementById('offline').classList.remove('show'));

    // ── PARTICLES ──
    const pw = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.className = 'particle';
      const s = Math.random()*3+1;
      const c = Math.random()>.5 ? 'rgba(50,180,50,' : 'rgba(200,20,40,';
      el.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;bottom:-8px;`
        + `background:${c+(Math.random()*.35+.15)});`
        + `animation-duration:${Math.random()*14+8}s;animation-delay:${Math.random()*12}s;`;
      pw.appendChild(el);
    }

    // ── SUPABASE CONFIG ──
    const BASE = 'https://rqfanspmwddnaptwxpsa.supabase.co';
    const KEY  = 'sb_publishable_Xe1T_CFo-gxVP-5sM0rV1g_J9PqJ5-P';
    const cEl  = document.getElementById('counter');

    // Ключ для localStorage — если уже заразился, не считаем повторно
    const LS_KEY = 'l_infection_done';

    async function callRPC(fnName, params = {}) {
      const res = await fetch(`${BASE}/rest/v1/rpc/${fnName}`, {
        method: 'POST',
        headers: {
          'apikey': KEY,
          'Authorization': 'Bearer ' + KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(params)
      });
      if (!res.ok) {
        const err = await res.text();
        throw new Error(`RPC ${fnName} failed: ${res.status} — ${err}`);
      }
      return res.json();
    }

    // Просто читаем текущий счётчик без инкремента
    async function getCount() {
      const res = await fetch(`${BASE}/rest/v1/l_infection_counter?id=eq.1&select=count`, {
        headers: {
          'apikey': KEY,
          'Authorization': 'Bearer ' + KEY
        }
      });
      const data = await res.json();
      return data?.[0]?.count ?? 0;
    }

    // ── АНИМАЦИЯ ЧИСЛА ──
    function animCount(target) {
      const from = Math.max(1, target - Math.max(1, Math.floor(target * .08)));
      const t0 = performance.now(), dur = 1300;
      (function tick(now) {
        const p = Math.min((now - t0) / dur, 1);
        const e = 1 - Math.pow(1 - p, 3);
        cEl.textContent = Math.round(from + (target - from) * e).toLocaleString('ru-RU');
        if (p < 1) requestAnimationFrame(tick);
      })(t0);
    }

    // ── MAIN ──
    // Флаг чтобы run() не выполнился дважды (StrictMode / случайный двойной вызов)
    let _ran = false;

    async function run() {
      if (_ran) return;
      _ran = true;

      if (!checkOnline()) return;

      const t_start = performance.now();
      setTimeout(() => document.getElementById('loader').classList.add('hide'), 850);

      try {
        let count;

        if (localStorage.getItem(LS_KEY)) {
          // Уже заражён раньше — просто показываем текущее число, не инкрементируем
          count = await getCount();
        } else {
          // Первый визит — инкрементируем и запоминаем
          count = await callRPC('increment_infection');
          count = typeof count === 'number' ? count : Number(count);
          localStorage.setItem(LS_KEY, '1');
        }

        const elapsed = performance.now() - t_start;
        const wait = Math.max(0, 5200 - elapsed);
        setTimeout(() => animCount(Number(count)), wait);

      } catch (e) {
        console.error('Supabase error:', e);
        cEl.textContent = '???';
      }
    }

    run();
  </script>
</body>
</html>
